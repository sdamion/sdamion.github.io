<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://esm.sh; style-src 'self' https://fonts.googleapis.com; connect-src 'self' https://api.coingecko.com https://api.geckoterminal.com https://api.starch.one https://api.tdsp.online https://api.koios.rest https://cardano-mainnet.blockfrost.io https://esm.sh https://ipfs.io; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src 'self'; form-action 'self'">
    <title>The Dutch Stake Pool | Starch Mining Stats TDSP 01</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/webp" sizes="192x192" href="tdsp_logo_ico.webp">
</head>
<body>
    <script src="starch.js" defer></script>
    <script src="chart.js"></script>
    <main class="container">
        <h1>Starch Stats</h1>
        <div id="totalBalanceRow"></div>
        <canvas id="minerChart"></canvas>
        <br>
        <label for="teamSelector">Select Company:</label>
        <select id="teamSelector"></select>
        <input id="customTeamId" type="text">
        <p id="teamBalance"></p>
        <p id="weeklyBlocks"></p>
        <div class="table-container">
        <table id="minersTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Miner</th>
                    <th>Rank</th>
                    <th>Blocks</th>
                    <th>$STRCH</th>
                </tr>
            </thead>
            <tbody id="minerTableBody"></tbody>
        </table>
        </div>
        <div class="refresh-time small-text">Last Updated: <span id="last-updated">Never</span></div>
        <div class="small-text">Source <a href="https://starch.one" target="_blank" rel="noopener noreferrer" aria-label="Starch.one">http://starch.one</a></div>
        <br>
        <div id="links-container"></div>
        <script src="links-loader.js" defer></script>
    <footer>
        &copy; 2026 The Dutch Stake Pool. All rights reserved.
    </footer>
    </main>
</body>
</html>
