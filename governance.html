<section class="section governance-page" id="governance">
    <div class="section-inner">
        <p class="eyebrow">Cardano governance</p>
        <h2>Governance Actions</h2>
        <p>Grouped by Treasury Withdrawals and Info Actions.</p>
        <div class="governance-budget-bar">
            <span id="gov-budget-limit"></span>
            <span id="gov-budget-used"></span>
            <span id="gov-budget-remaining"></span>
            <span id="gov-budget-after-spend"></span>
        </div>

        <div class="governance-summary" id="governance-summary">
            <div id="gov-committee-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show Constitutional Committee members">
                <strong id="gov-committee-count">0</strong>
                <span>CC Members</span>
            </div>
            <div id="gov-active-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show active governance actions">
                <strong id="gov-active-count">0</strong>
                <span>Active</span>
                <span class="governance-summary-subvalue" id="gov-active-ask">0 ADA</span>
            </div>
            <div id="gov-approved-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show approved governance actions">
                <strong id="gov-approved-count">0</strong>
                <span>Approved</span>
                <span class="governance-summary-subvalue" id="gov-approved-ask">0 ADA</span>
            </div>
            <div id="gov-rejected-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show rejected governance actions">
                <strong id="gov-rejected-count">0</strong>
                <span>Rejected</span>
                <span class="governance-summary-subvalue" id="gov-rejected-ask">0 ADA</span>
            </div>
            <div id="gov-info-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show info governance actions"><strong id="gov-info-count">0</strong><span>Info Actions</span></div>
            <div id="gov-drep-card" class="governance-summary-clickable" role="button" tabindex="0" aria-label="Show DRep directory">
                <div class="governance-drep-count-line">
                    <strong id="gov-drep-count">0</strong>
                    <span class="governance-drep-count-state governance-drep-count-state--active" id="gov-drep-active-count">A0</span>
                    <span class="governance-drep-count-state governance-drep-count-state--inactive" id="gov-drep-inactive-count">IA0</span>
                </div>
                <span>DReps</span>
                <span class="governance-summary-subvalue" id="gov-drep-total-power">VPower 0 ADA</span>
            </div>
        </div>

        <p class="small-text">Source: <a href="https://api.koios.rest/" target="_blank" rel="noopener noreferrer" aria-label="Koios API">Koios API</a></p>
    </div>
</section>
